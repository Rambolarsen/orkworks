name: orkworks
version: 1.0.0
description: APM project for orkworks
author: Lars-Erik
# Which agent platforms to deploy to.
# Resolution order: --target flag > this field > auto-detect from filesystem.
# Accepted values: copilot, claude, cursor, opencode, codex, gemini, windsurf, all
targets:
  - claude
  - codex
  - copilot
  - opencode
dependencies:
  apm:
    - obra/superpowers
    - DietrichGebert/ponytail
    - thedotmack/claude-mem
    - leonardomso/rust-skills
    - git: mattpocock/skills
      skills:
        - improve-codebase-architecture
  mcp: []
includes: auto
scripts: {}
