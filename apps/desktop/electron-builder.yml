appId: ai.orkworks.desktop
productName: OrkWorks
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: OrkWorks-${version}-mac-${arch}.${ext}
  extraResources:
    - from: ../../crates/orkworksd/target/release/orkworksd
      to: orkworksd
win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: OrkWorks-${version}-win-${arch}.${ext}
  extraResources:
    - from: ../../crates/orkworksd/target/release/orkworksd.exe
      to: orkworksd.exe
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  artifactName: OrkWorks-${version}-linux-${arch}.${ext}
  extraResources:
    - from: ../../crates/orkworksd/target/release/orkworksd
      to: orkworksd
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
